<svg width="900" height="1024" viewBox="0 0 900 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(450 420) rotate(90) scale(700 620)">
      <stop offset="0%" stop-color="#14585A"/>
      <stop offset="55%" stop-color="#0F4B4D"/>
      <stop offset="100%" stop-color="#0B3E40"/>
    </radialGradient>

    <!-- Soft gold -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2B34B"/>
      <stop offset="50%" stop-color="#C9921E"/>
      <stop offset="100%" stop-color="#F0C96B"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <!-- Large background geometry -->
    <g id="bgRosette" stroke="#8A7A4F" stroke-opacity="0.24" fill="none" stroke-width="7">
      <polygon points="0,-220 78,-135 190,-110 135,-10 155,110 40,110 0,220 -40,110 -155,110 -135,-10 -190,-110 -78,-135"/>
      <polygon points="0,-220 135,-135 220,0 135,135 0,220 -135,135 -220,0 -135,-135"/>
      <polygon points="0,-260 225,-130 225,130 0,260 -225,130 -225,-130"/>
      <polygon points="0,-180 180,0 0,180 -180,0"/>
      <circle cx="0" cy="0" r="205"/>
    </g>

    <!-- Small corner flower -->
    <g id="cornerFlower" stroke="#8A7A4F" stroke-opacity="0.38" fill="none" stroke-width="5">
      <polygon points="0,-70 18,-30 55,-55 30,-18 70,0 30,18 55,55 18,30 0,70 -18,30 -55,55 -30,18 -70,0 -30,-18 -55,-55 -18,-30"/>
      <polygon points="0,-110 28,-48 85,-85 48,-28 110,0 48,28 85,85 28,48 0,110 -28,48 -85,85 -48,28 -110,0 -48,-28 -85,-85 -28,-48"/>
    </g>

    <!-- Mihrab shape -->
    <path id="mihrabPath"
      d="M450 185
         C410 220, 360 240, 305 285
         C245 335, 205 390, 205 480
         C175 480, 145 503, 145 550
         L145 690
         C145 737, 175 760, 205 760
         C205 830, 270 875, 320 900
         C375 928, 415 962, 450 992
         C485 962, 525 928, 580 900
         C630 875, 695 830, 695 760
         C725 760, 755 737, 755 690
         L755 550
         C755 503, 725 480, 695 480
         C695 390, 655 335, 595 285
         C540 240, 490 220, 450 185 Z"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="1024" fill="url(#bgGlow)"/>

  <!-- Soft texture glows -->
  <circle cx="300" cy="350" r="90" fill="#2F8C88" opacity="0.08"/>
  <circle cx="610" cy="415" r="110" fill="#2F8C88" opacity="0.06"/>
  <circle cx="235" cy="735" r="100" fill="#2F8C88" opacity="0.05"/>
  <circle cx="705" cy="770" r="90" fill="#2F8C88" opacity="0.05"/>

  <!-- Main faint background ornament -->
  <g transform="translate(450 520)">
    <use href="#bgRosette"/>
  </g>

  <!-- Bottom-left ornament -->
  <g transform="translate(90 910) scale(1.05)">
    <use href="#cornerFlower"/>
  </g>

  <!-- Mihrab double border -->
  <use href="#mihrabPath" fill="none" stroke="url(#gold)" stroke-width="3.2"/>
  <use href="#mihrabPath" fill="none" stroke="#F3D27A" stroke-opacity="0.7" stroke-width="1.1"
       transform="translate(0 0) scale(0.972 0.972)" transform-origin="450 590"/>

  <!-- Title -->
  <g filter="url(#softShadow)">
    <text x="450" y="560"
      text-anchor="middle"
      font-size="112"
      font-family="Lora, Georgia, serif"
      font-weight="700"
      fill="url(#gold)">
      Mihraby
    </text>

    <text x="450" y="635"
      text-anchor="middle"
      font-size="34"
      font-family="Lora, Georgia, serif"
      font-style="italic"
      font-weight="600"
      fill="#F4E8CF">
      Your Learning Sanctuary
    </text>
  </g>
</svg>